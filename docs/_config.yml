title: deer
description: Unattended coding agent — run multiple Claude Code instances safely in parallel.

remote_theme: just-the-docs/just-the-docs@v0.10.1

url: https://zdavison.github.io
baseurl: /deer

color_scheme: dark

search_enabled: true
search:
  heading_level: 2
  previews: 3

nav_sort: order

aux_links:
  "GitHub":
    - https://github.com/zdavison/deer

aux_links_new_tab: true

footer_content: >-
  <span>deer is open source.
  <a href="https://github.com/zdavison/deer">View on GitHub</a> &mdash;
  licensed under <a href="https://github.com/zdavison/deer/blob/main/LICENSE">MIT</a>.</span>

back_to_top: true
back_to_top_text: "Back to top"

heading_anchors: true

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme
